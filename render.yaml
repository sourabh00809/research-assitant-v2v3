services:
  - type: web
    name: research-assistant
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AI_SCIENTIST_ENV
        value: production
      - key: AI_SCIENTIST_STORE_BACKEND
        value: sqlite
      - key: AI_SCIENTIST_DISABLE_AUTH
        value: "0"
      - key: AI_SCIENTIST_AI_PROVIDER
        value: auto
      - key: AI_SCIENTIST_MODEL
        value: mixtral-8x7b-32768
      - key: AI_SCIENTIST_LIVE_SEARCH
        value: "1"
      - key: AI_SCIENTIST_COOKIE_SECURE
        value: "true"
      - key: AI_SCIENTIST_COOKIE_SAMESITE
        value: lax
      - key: AI_SCIENTIST_JWT_TTL_SECONDS
        value: "604800"
      - key: AI_SCIENTIST_STORAGE_BACKEND
        value: local
      - key: AI_SCIENTIST_SANDBOX_BACKEND
        value: disabled
      - key: AI_SCIENTIST_PUBMED_ENABLED
        value: "false"
      - key: AI_SCIENTIST_OPENALEX_ENABLED
        value: "true"
      - key: AI_SCIENTIST_CORE_ENABLED
        value: "false"
      - key: AI_SCIENTIST_CROSSREF_ENABLED
        value: "true"
      - key: AI_SCIENTIST_EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: AI_SCIENTIST_GROQ_ENABLED
        value: "true"
      - key: AI_SCIENTIST_PUBLIC_BASE_URL
        sync: false
      - key: AI_SCIENTIST_APP_PASSWORD
        sync: false
      - key: AI_SCIENTIST_JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: research-assets
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: UNSTRUCTURED_API_KEY
        sync: false

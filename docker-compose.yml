services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend

  backend:
    build: .
    command: python -m uvicorn ai_scientist.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      redis:
        condition: service_started

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ./frontend:/app/frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - backend

  worker:
    build: .
    command: celery -A ai_scientist.celery_app.celery_app worker --loglevel=info --concurrency=${AI_SCIENTIST_WORKER_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      - backend
      - redis

  scheduler:
    build: .
    command: celery -A ai_scientist.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

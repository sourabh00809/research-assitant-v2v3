services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - frontend
      - backend

  backend:
    build: .
    command: python -m uvicorn ai_scientist.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ai_scientist:ai_scientist@postgres:5432/ai_scientist
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      AI_SCIENTIST_STORE_BACKEND: postgres
      AI_SCIENTIST_STORAGE_BACKEND: minio
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  frontend:
    image: node:20-slim
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    volumes:
      - ./frontend:/app/frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000
    depends_on:
      - backend

  worker:
    build: .
    command: celery -A ai_scientist.celery_app.celery_app worker --loglevel=info --concurrency=${AI_SCIENTIST_WORKER_CONCURRENCY:-2}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ai_scientist:ai_scientist@postgres:5432/ai_scientist
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      AI_SCIENTIST_STORE_BACKEND: postgres
      AI_SCIENTIST_STORAGE_BACKEND: minio
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    depends_on:
      - backend
      - redis

  scheduler:
    build: .
    command: celery -A ai_scientist.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ai_scientist
      POSTGRES_USER: ai_scientist
      POSTGRES_PASSWORD: ai_scientist
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_scientist -d ai_scientist"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  stripe-cli:
    image: stripe/stripe-cli:latest
    profiles: ["stripe"]
    command: listen --forward-to backend:8000/api/v1/billing/webhook
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
